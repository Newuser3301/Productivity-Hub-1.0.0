# docker-compose.yml
services:
  productivity-hub:
    build:
      context: .
      target: production
    container_name: productivity-hub
    environment:
      NODE_ENV: production
      VITE_APP_NAME: Productivity Hub
      DATABASE_FILE: /app/data/productivity-hub.sqlite
    ports:
      - "4173:4173"
    volumes:
      - productivity-hub-data:/app/data
    command: ["node", "server.js"]

volumes:
  productivity-hub-data:
