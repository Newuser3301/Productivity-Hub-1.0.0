services:
  - type: web
    name: productivity-hub
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.12.0
      - key: DATABASE_FILE
        value: /app/data/productivity-hub.sqlite
    disk:
      name: productivity-hub-data
      mountPath: /app/data
      sizeGB: 1
